<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bananeko Community | Minecraft Server</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; }
        canvas { display: block; }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 10;
            pointer-events: none;
        }

        .content {
            text-align: center;
            pointer-events: auto;
        }

        h1 {
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            color: #fff;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            animation: titleFade 2s ease-out;
        }

        .discord-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 18px 45px;
            background: #5865F2;
            color: white;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            border-radius: 4px;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            border: 2px solid transparent;
            animation: btnFade 2.5s ease-out;
        }

        .discord-btn:hover {
            background: transparent;
            border-color: #5865F2;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.4);
        }

        @keyframes titleFade {
            from { opacity: 0; transform: translateY(-30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes btnFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="content">
            <h1>BANANEKO<br>COMMUNITY</h1>
            <a href="https://discord.gg/eh3BXXqBMq" target="_blank" class="discord-btn">JOIN DISCORD</a>
        </div>
    </div>

    <script>
        let scene, camera, renderer, world, clouds = [];
        
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a0a05); // 深い夕焼けの底の色
            scene.fog = new THREE.FogExp2(0x2d140b, 0.035); // 遠くの霧

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // ライティング (夕焼け)
            const sunLight = new THREE.DirectionalLight(0xff7b39, 1.2);
            sunLight.position.set(50, 20, -50);
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0x404040, 0.5));

            // ボクセル地形生成
            world = new THREE.Group();
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            
            const grassMat = new THREE.MeshLambertMaterial({ color: 0x3d5229 });
            const dirtMat = new THREE.MeshLambertMaterial({ color: 0x4a321f });
            const stoneMat = new THREE.MeshLambertMaterial({ color: 0x444444 });

            for(let x = -25; x < 25; x++) {
                for(let z = -25; z < 25; z++) {
                    const h = Math.floor(Math.sin(x/5) * Math.cos(z/5) * 3) + 3;
                    for(let y = 0; y <= h; y++) {
                        let mat = dirtMat;
                        if (y === h) mat = grassMat;
                        if (y < h - 2) mat = stoneMat;
                        
                        const voxel = new THREE.Mesh(boxGeo, mat);
                        voxel.position.set(x, y, z);
                        world.add(voxel);
                    }
                }
            }
            scene.add(world);

            // 雲の生成
            const cloudGeo = new THREE.BoxGeometry(4, 1, 2);
            const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffa07a, transparent: true, opacity: 0.6 });
            for(let i = 0; i < 15; i++) {
                const cloud = new THREE.Mesh(cloudGeo, cloudMat);
                cloud.position.set(Math.random()*60-30, 15 + Math.random()*5, Math.random()*60-30);
                scene.add(cloud);
                clouds.push(cloud);
            }

            camera.position.set(15, 12, 15);
            camera.lookAt(0, 2, 0);
        }

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.002;

            // シネマティックカメラ移動
            camera.position.x = 18 * Math.cos(time * 0.5);
            camera.position.z = 18 * Math.sin(time * 0.5);
            camera.lookAt(0, 2, 0);

            // 雲の移動
            clouds.forEach(c => {
                c.position.x += 0.01;
                if(c.position.x > 30) c.position.x = -30;
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
