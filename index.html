<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bananeko Community | Minecraft Server</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            background-color: #87CEEB;
            font-family: 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
        }

        /* 背景固定 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        /* メインビジュアル */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.1) 100%);
        }

        h1 {
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
            font-size: clamp(3.5rem, 12vw, 7rem);
            color: #fff;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 8px 0 #4caf50, 0 15px 30px rgba(0,0,0,0.3);
            animation: bounceIn 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .discord-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 20px 50px;
            background: #5865F2;
            color: white;
            text-decoration: none;
            font-weight: 900;
            border-radius: 50px;
            font-size: 1.5rem;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.5);
            border: 4px solid #fff;
            animation: pulse 2s infinite;
        }

        .discord-btn:hover {
            transform: scale(1.1);
            background: #4752c4;
        }

        /* スクロールコンテンツ */
        .content-section {
            padding: 100px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            max-width: 800px;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 5px solid #4caf50;
            text-align: left;
        }

        .info-card h2 {
            font-size: 2.5rem;
            color: #2e7d32;
            margin-top: 0;
            border-bottom: 4px solid #4caf50;
            display: inline-block;
            margin-bottom: 30px;
        }

        .info-card p {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #333;
            font-weight: 700;
        }

        .footer {
            text-align: center;
            padding: 40px;
            color: white;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3) translateY(100px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="hero">
        <h1>BANANEKO<br>COMMUNITY</h1>
        <a href="https://discord.gg/eh3BXXqBMq" target="_blank" class="discord-btn">JOIN DISCORD</a>
    </div>

    <div class="content-section">
        <div class="info-card">
            <h2>Bananeko serverとは</h2>
            <p>
                Bananeko serverとはDiscordサーバーやマイクラサーバーがあるサーバーです。<br><br>
                現在は国家サーバー、サバイバルサーバーがあってPVP鯖を作成中です。<br>
                雑談勢、マイクラ勢誰でも大歓迎なのでぜひ来てみてください。
            </p>
        </div>
    </div>

    <div class="footer">
        © 2025 Bananeko Community
    </div>

    <script>
        let scene, camera, renderer, world, clouds = [];
        
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.Fog(0x87CEEB, 20, 60); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const canvas = document.getElementById('bg-canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(10, 50, 20);
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            world = new THREE.Group();
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            const grassMat = new THREE.MeshLambertMaterial({ color: 0x7cfc00 });
            const dirtMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
            const stoneMat = new THREE.MeshLambertMaterial({ color: 0x808080 });

            for(let x = -30; x < 30; x++) {
                for(let z = -30; z < 30; z++) {
                    const noise = Math.sin(x/4) * Math.cos(z/4);
                    const h = Math.floor(noise * 4) + 4;
                    for(let y = 0; y <= h; y++) {
                        let mat = dirtMat;
                        if (y === h) mat = grassMat;
                        if (y < h - 2) mat = stoneMat;
                        const voxel = new THREE.Mesh(boxGeo, mat);
                        voxel.position.set(x, y, z);
                        world.add(voxel);
                    }
                }
            }
            scene.add(world);

            const cloudGeo = new THREE.BoxGeometry(5, 1.2, 3);
            const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
            for(let i = 0; i < 20; i++) {
                const cloud = new THREE.Mesh(cloudGeo, cloudMat);
                cloud.position.set(Math.random()*80-40, 18 + Math.random()*8, Math.random()*80-40);
                scene.add(cloud);
                clouds.push(cloud);
            }
            camera.position.set(20, 15, 20);
        }

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.0015;
            camera.position.x = 25 * Math.cos(time);
            camera.position.z = 25 * Math.sin(time);
            camera.position.y = 15 + Math.sin(time * 0.5) * 2;
            camera.lookAt(0, 5, 0);
            clouds.forEach(c => {
                c.position.x += 0.02;
                if(c.position.x > 40) c.position.x = -40;
            });
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
